services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80"
    depends_on:
      - server
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/collaboration-platform}
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_me_in_production}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  mongo:
    image: mongo:8
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
